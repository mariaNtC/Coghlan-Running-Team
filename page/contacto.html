    <!-- Script de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Script de manejo del formulario con EmailJS -->
    <script>
    document.getElementById('formContacto').addEventListener('submit', function(e) {
        e.preventDefault();

        const nombre   = document.getElementById('inputNombre').value.trim();
        const email    = document.getElementById('inputEmail').value.trim();
        const asunto   = document.getElementById('inputAsunto').value.trim();
        const mensaje  = document.getElementById('inputMensaje').value.trim();
        const btnEnviar = document.getElementById('btnEnviar');

        if (!nombre || !email || !asunto || !mensaje) {
            Toastify({
                text: "Por favor completá todos los campos.",
                close: true, position: "left", gravity: "bottom", duration: 2500,
                style: { background: "linear-gradient(to right, #e6ba5b, #ffd884)" }
            }).showToast();
            return;
        }

        btnEnviar.disabled = true;
        btnEnviar.textContent = "ENVIANDO...";

        // CONFIGURACION EMAILJS:
        // Reemplazá "TU_SERVICE_ID" y "TU_TEMPLATE_ID" con los valores de tu cuenta en emailjs.com
        // El template debe tener las variables: {{nombre}}, {{email}}, {{asunto}}, {{mensaje}}
        emailjs.send("service_uf2r8pm", "template_uvtqknv", {            
            name:  nombre,
            contact:   email,
            subject:  asunto,
            message: mensaje
        }).then(() => {
            Toastify({
                text: "Mensaje enviado correctamente. ¡Gracias!",
                close: true, position: "left", gravity: "bottom", duration: 3000,
                style: { background: "linear-gradient(to right, #00b09b, #96c93d)" }
            }).showToast();
            document.getElementById('formContacto').reset();
        }).catch(() => {
            Toastify({
                text: "Hubo un error al enviar el mensaje. Intentá nuevamente.",
                close: true, position: "left", gravity: "bottom", duration: 3000,
                style: { background: "linear-gradient(to right, #e65b5b, #ec8b8b)" }
            }).showToast();
        }).finally(() => {
            btnEnviar.disabled = false;
            btnEnviar.textContent = "ENVIAR";
        });
    });
    </script>
